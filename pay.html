<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Polaris Science | 수강료 결제</title>

<script src="https://js.tosspayments.com/v2/standard"></script>

</head>

<body style="font-family:sans-serif;background:#0b1220;color:white;padding:40px">

<h2>Polaris Science 수강료 결제</h2>

<p>수업 선택</p>

<select id="classSelect">
<option value="240000">중등과학 개념반 (240000)</option>
<option value="220000">중등과학 심화 / 고등선행 (220000)</option>
<option value="220000">영재입시 유형반 (220000)</option>
</select>

<br><br>

<input id="studentName" placeholder="학생명"><br><br>
<input id="parentName" placeholder="학부모명"><br><br>

<button onclick="pay()">결제하기</button>

<script>

const clientKey = "test_ck_ZLKGPx4M3MqNM5RP5nAd3BaWypv1"

const tossPayments = TossPayments(clientKey)

const payment = tossPayments.payment({
customerKey: TossPayments.ANONYMOUS
})

function makeOrderId(){
return "polaris_" + Date.now()
}

async function pay(){

const amount = Number(document.getElementById("classSelect").value)
const student = document.getElementById("studentName").value
const parent = document.getElementById("parentName").value

if(!student || !parent){
alert("학생명과 학부모명을 입력하세요")
return
}

const orderId = makeOrderId()

await payment.requestPayment({

method:"CARD",

amount:{
currency:"KRW",
value:amount
},

orderId:orderId,

orderName:"Polaris Science 수강료",

successUrl:window.location.origin + "/success.html",

failUrl:window.location.origin + "/fail.html",

customerName:parent

})

}

</script>

</body>
</html>
