<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>결제 완료 | Polaris Science Academy</title>
  <meta name="description" content="결제 완료 안내" />
  <style>
    :root{
      --bg1:#f7fbff; --bg2:#eaf6ff;
      --ink:#0b1b2b; --muted:#4b647a;
      --card:#ffffffcc; --stroke:#d6e7f7;
      --brand:#1f74ff; --brand2:#22b7ff;
      --shadow: 0 12px 35px rgba(10, 30, 60, .10);
      --radius: 18px;
      --ok:#0aa66b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(1200px 600px at 15% 15%, #ffffff 0%, transparent 55%),
        radial-gradient(900px 500px at 85% 20%, #dff2ff 0%, transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    a{color:inherit; text-decoration:none}
    .box{
      width:min(760px, 100%);
      background: var(--card);
      border:1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .top{
      padding:20px 20px 12px;
      display:flex;
      align-items:center;
      gap:12px;
    }
    .top img{
      width:46px; height:46px;
      object-fit:contain;
      border-radius:14px;
      border:1px solid var(--stroke);
      background:#fff;
      padding:7px;
    }
    .badge{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background: rgba(255,255,255,.75);
      border:1px solid var(--stroke);
      color: var(--muted);
      font-weight:900;
      font-size:12px;
    }
    .main{padding:0 20px 20px;}
    h1{margin:10px 0 8px; font-size:28px; letter-spacing:-.4px;}
    p{margin:0; color:var(--muted); line-height:1.75; font-size:14.5px;}
    .okmark{
      display:inline-flex;
      align-items:center;
      gap:10px;
      margin-top:14px;
      padding:12px 14px;
      border-radius:16px;
      background: rgba(10,166,107,.08);
      border:1px solid rgba(10,166,107,.25);
      color:#0b3a2a;
      font-weight:800;
    }
    .actions{
      display:flex; gap:10px; flex-wrap:wrap;
      margin-top:16px;
    }
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      padding:10px 14px; border-radius:999px;
      border:1px solid var(--stroke); background:#fff;
      font-weight:900;
      box-shadow: 0 10px 22px rgba(10,30,60,.06);
      transition: transform .15s ease, box-shadow .15s ease;
      white-space:nowrap;
    }
    .btn:hover{transform:translateY(-1px); box-shadow: 0 16px 30px rgba(10,30,60,.10);}
    .btn.primary{
      border:none; color:#fff;
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      box-shadow: 0 14px 30px rgba(31,116,255,.22);
    }
    .btn.primary:hover{box-shadow: 0 18px 36px rgba(31,116,255,.28);}
    .foot{
      padding:16px 20px;
      border-top:1px solid var(--stroke);
      background: rgba(255,255,255,.55);
      display:flex; align-items:center; justify-content:space-between;
      gap:12px; flex-wrap:wrap;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="top">
      <img src="assets/polaris-logo.png" alt="Polaris Science 로고">
      <div>
        <div class="badge">✅ 결제가 완료되었습니다</div>
        <div style="margin-top:6px; font-weight:900; letter-spacing:.2px;">POLARIS SCIENCE ACADEMY</div>
      </div>
    </div>

    <div class="main">
      <h1>결제 완료</h1>
      <p>
        결제가 정상적으로 처리되었습니다.<br/>
        수강 확정/추가 안내가 필요한 경우, 안내 채널(문자/카톡/메일)로 확인 메시지를 드립니다.
      </p>

      <div class="okmark">✔ 확인 완료 · 감사합니다!</div>

      <div class="actions">
        <a class="btn primary" href="./index.html">홈으로</a>
        <a class="btn" href="./pay.html">결제 안내</a>
        <a class="btn" href="https://blog.naver.com/yio02" target="_blank" rel="noopener">네이버 블로그</a>
      </div>
    </div>

    <div class="foot">
      <div><b>폴라리스 사이언스의 자세한 소식은 네이버블로그를 통해 접하실 수 있습니다.</b></div>
      <a class="btn primary" href="https://blog.naver.com/yio02" target="_blank" rel="noopener">블로그 바로가기</a>
    </div>
  </div>
</body>
</html>
